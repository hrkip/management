<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Kampung Inggris Pontianak</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#464653",
                        "secondary": "#b22b1d",
                        "primary": "#00003c",
                        "outline": "#767684"
                    },
                    fontFamily: {
                        "body-md": ["Lexend"],
                        "lexend": ["Lexend"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .space-bg {
            background: radial-gradient(circle at 50% 50%, #0a0a2e 0%, #05051a 100%);
            position: relative;
            overflow: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            animation: stars-move 100s linear infinite;
        }

        .nebula {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: 
                radial-gradient(circle at 20% 30%, rgba(178, 43, 29, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 0, 60, 0.2) 0%, transparent 50%);
            filter: blur(60px);
        }

        @keyframes stars-move {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        @keyframes card-fade-in {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .animate-card {
            animation: card-fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .floating-wrapper {
            animation: float 6s ease-in-out infinite;
            animation-delay: 0.6s; 
        }

        .input-group:focus-within .material-symbols-outlined {
            color: #b22b1d;
            transform: translateY(-50%) scale(1.15);
        }

        .input-field {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="space-bg font-body-md text-white flex flex-col">
    <div class="stars"></div>
    <div class="nebula"></div>
    
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 sm:px-6 md:px-8 h-16 bg-white/5 backdrop-blur-md border-b border-white/10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-white" data-icon="school">school</span>
            <span class="font-lexend text-sm sm:text-base font-bold tracking-tight text-white uppercase tracking-wider">Kampung Inggris</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 relative z-10 w-full">
        <div class="floating-wrapper w-full max-w-[420px] lg:scale-90 lg:origin-center transition-transform duration-300">
            <div class="bg-white/95 backdrop-blur-xl rounded-3xl p-6 sm:p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/20 animate-card">
                
                <div class="flex flex-col items-center mb-8">
                    <div class="mb-6 transform hover:scale-110 transition-transform duration-500 bg-gray-50 p-4 rounded-full shadow-inner">
                        <img alt="Logo" class="h-16 w-16 sm:h-20 sm:w-20 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uj96a0YECZbtoOgftkfQZBr4oszPorfpBJLzNy7MshgLyESscVJlyeVC0RkKut9zRRM3lQZoXNgXHr6c76TP5NcXc5lwNjn6GCzboJ9c4FS_KGMF36WH-hDEi0dJeyCWQfsnJVxggWDNlVKMkwryQ2q04p9f6qDy2zaXPv-fnPrEcwn37h9-I5cb_KeCpHLTuHRekDD-PCE19tGhQChwbd4fnpeEX_4nxkcauOMzm-AdFSwrvydd-0IBTxYAHloZnqJX5t2PDZQSA"/>
                    </div>
                    <h1 class="font-lexend text-2xl sm:text-3xl font-bold text-primary text-center">Welcome Back</h1>
                    <p class="font-lexend text-sm text-on-surface-variant text-center mt-2">Log in to your academic portal</p>
                </div>

                <form id="loginForm" class="space-y-6">
                    <div class="space-y-2 group input-group relative">
                        <label class="font-lexend text-xs font-semibold text-on-surface-variant block transition-colors group-focus-within:text-secondary uppercase tracking-wider" for="username">Username</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-all duration-300" data-icon="person">person</span>
                            <input class="input-field w-full pl-10 pr-4 py-3.5 bg-gray-50 text-gray-900 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-secondary/20 focus:border-secondary font-lexend outline-none shadow-sm" id="username" name="username" placeholder="Enter your username" type="text" required/>
                        </div>
                    </div>

                    <div class="space-y-2 group input-group relative">
                        <label class="font-lexend text-xs font-semibold text-on-surface-variant block transition-colors group-focus-within:text-secondary uppercase tracking-wider" for="password">Password</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-all duration-300" data-icon="lock">lock</span>
                            <input class="input-field w-full pl-10 pr-10 py-3.5 bg-gray-50 text-gray-900 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-secondary/20 focus:border-secondary font-lexend outline-none shadow-sm" id="password" name="password" placeholder="••••••••" type="password" required/>
                            <button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors focus:outline-none" type="button" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password';">
                                <span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-1 pb-2">
                        <div class="flex items-center gap-2">
                            <input class="w-4 h-4 text-secondary border-gray-300 rounded focus:ring-secondary cursor-pointer transition-all" id="remember" name="remember" type="checkbox"/>
                            <label class="font-lexend text-xs text-on-surface-variant cursor-pointer select-none" for="remember">Remember Me</label>
                        </div>
                        <a class="font-lexend text-xs text-secondary hover:text-primary transition-colors font-medium" href="#">Forgot Password?</a>
                    </div>

                    <button id="submitBtn" class="relative w-full bg-secondary text-white py-4 rounded-xl font-lexend font-bold text-sm sm:text-base shadow-lg shadow-secondary/30 hover:bg-[#8f0f07] hover:shadow-secondary/50 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all duration-300 overflow-hidden flex justify-center items-center gap-2" type="submit">
                        <span id="btnText">Login Securely</span>
                        <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100">
                    <p class="font-lexend text-xs text-on-surface-variant text-center">
                        New to the management team? 
                        <a class="text-secondary font-bold hover:text-primary transition-colors ml-1" href="#">Request Access</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full py-6 px-4 sm:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 mt-auto relative z-10 bg-black/20 backdrop-blur-sm">
        <p class="font-lexend text-xs font-medium text-gray-400 text-center sm:text-left">© 2026 Kampung Inggris Pontianak.</p>
        <div class="flex flex-wrap justify-center gap-4 sm:gap-6">
            <a class="font-lexend text-xs font-medium text-gray-400 hover:text-white transition-colors" href="#">Privacy</a>
            <a class="font-lexend text-xs font-medium text-gray-400 hover:text-white transition-colors" href="#">Terms</a>
            <a class="font-lexend text-xs font-medium text-gray-400 hover:text-white transition-colors" href="#">Support</a>
        </div>
    </footer>

    <script>
        // REFINEMENT: Event Listener untuk me-load data Remember Me saat halaman terbuka
        document.addEventListener("DOMContentLoaded", () => {
            const savedUsername = localStorage.getItem('ki_remembered_username');
            const savedPassword = localStorage.getItem('ki_remembered_password');
            
            if (savedUsername && savedPassword) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('password').value = savedPassword;
                document.getElementById('remember').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const rememberChecked = document.getElementById('remember').checked;
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const mainCard = document.querySelector('.floating-wrapper'); 
            
            // UI Loading state
            btnText.textContent = 'Authenticating...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            
            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.success) {
                        // Simpan data user (termasuk Role) ke Session
                        localStorage.setItem('currentUser', JSON.stringify(response.user));
                        
                        // REFINEMENT: Logika penyimpanan Remember Me
                        if (rememberChecked) {
                            localStorage.setItem('ki_remembered_username', usernameInput);
                            localStorage.setItem('ki_remembered_password', passwordInput);
                        } else {
                            localStorage.removeItem('ki_remembered_username');
                            localStorage.removeItem('ki_remembered_password');
                        }
                        
                        submitBtn.classList.replace('bg-secondary', 'bg-green-600');
                        btnSpinner.classList.add('hidden');
                        btnText.textContent = 'Access Granted!';
                        
                        setTimeout(() => {
                            mainCard.style.transition = "opacity 0.5s ease, transform 0.5s ease";
                            mainCard.style.opacity = "0";
                            mainCard.style.transform = "scale(0.95)";
                            
                            const userRole = response.user.role.toString().toLowerCase();
                            
                            // FIX: Helper function defined securely inside the scope
                            const renderNextLayer = function(html) {
                                document.open();
                                document.write(html);
                                document.close();
                            };
                            
                            if (userRole.includes('manager')) {
                                // Load UI Manager
                                google.script.run
                                    .withSuccessHandler(renderNextLayer)
                                    .getManagerDashboardHtml();
                            } else {
                                // Load UI Supervisor / Admin default
                                google.script.run
                                    .withSuccessHandler(renderNextLayer)
                                    .getDashboardHtml();
                            }
                        }, 600);
                        
                    } else {
                        resetButton();
                        alert(response.message);
                    }
                })
                .withFailureHandler(function(error) {
                    resetButton();
                    alert("Connection error. Please try again.");
                })
                .processLogin(usernameInput, passwordInput);

            function resetButton() {
                btnText.textContent = 'Login Securely';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
